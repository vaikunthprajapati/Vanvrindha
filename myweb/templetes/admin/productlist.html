<!DOCTYPE html>
<html>

<head>

    <title>Products</title>

    <link rel="stylesheet" href="/static/css/productlist.css">

</head>

<body>

    <a href="{% url 'homepage' %}" class="back-home-btn">
        <i class="fas fa-arrow-left"></i>
        Home
    </a>

    <div class="container">

        <h1 class="title">
            Product Management
        </h1>

        <div class="product-grid">

            {% for p in products %}

            <div class="product-card">

                <img src="/media/{{ p.4 }}" onerror="this.src='/static/images/defaultplant.jpg'">

                <h2>
                    {{ p.1 }}
                </h2>

                <div class="price">
                    ₹{{ p.3 }}
                </div>

                <div class="details">

                    <p>
                        Size:
                        {{ p.6 }} cm
                    </p>

                    <p>
                        Weight:
                        {{ p.7 }} kg
                    </p>

                    <p>
                        Soil:
                        {{ p.8 }}
                    </p>

                </div>

                <div class="actions">

                    <a class="edit-btn" href="/master/editproduct/{{ p.0 }}">
                        Edit
                    </a>

                    <a class="delete-btn" href="/master/deleteproduct/{{ p.0 }}">
                        Delete
                    </a>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
