{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Add Product</title>

    <link rel="stylesheet" href="/static/css/addproduct.css">

</head>

<body>

    {% if messages %}
    {% for message in messages %}
    <div class="success-message">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <a href="{% url 'homepage' %}" class="back-home-btn">
        <i class="fas fa-arrow-left"></i>
        Home
    </a>

    <div class="overlay">

        <div class="form-card">

            <h1>Add New Plant</h1>

            <form action="" method="post" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="form-group">
                    <label>Plant Name</label>
                    <input type="text" name="pname">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description"></textarea>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" name="price">
                </div>

                <div class="form-group">
                    <label>Image</label>
                    <input type="file" name="image">
                </div>

                <div class="form-group">
                    <label>Category</label>

                    <select name="category">

                        {% for c in categories %}

                        <option value="{{ c.0 }}">
                            {{ c.1 }}
                        </option>

                        {% endfor %}

                    </select>
                </div>

                <div class="form-group">
                    <label>Plant Size (cm)</label>
                    <input type="text" name="plant_size">
                </div>

                <div class="form-group">
                    <label>Plant Weight (kg)</label>
                    <input type="number" name="plant_weight">
                </div>

                <div class="form-group">
                    <label>Soil Type</label>

                    <select name="soil_type">

                        <option value="alluvial">Alluvial</option>
                        <option value="loamy">Loamy</option>
                        <option value="sandy">Sandy</option>
                        <option value="clay">Clay</option>
                        <option value="saline">Saline</option>

                    </select>

                </div>

                <button class="submit-btn">
                    Add Product
                </button>

            </form>

        </div>

    </div>

</body>

</html>
